<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
    <title>kR4N30 | Portfolio</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Styles -->
    <link rel="stylesheet" href="css/style.css" />
</head>

<body>

    <!-- OVERLAY -->
    <div id="enter-overlay">
        <div id="enter-box">
            <div id="enter-pulse"></div>
            <svg viewBox="0 0 24 24" fill="currentColor" width="42" height="42">
                <polygon points="5 3 19 12 5 21 5 3"/>
            </svg>
            <span>tap to enter</span>
        </div>
    </div>

    <!-- VIDEO BACKGROUND -->
    <div id="yt-bg">
        <div id="yt-player"></div>
    </div>

    <!-- SOUND TOGGLE -->
    <button id="sound-btn" title="Toggle sound">
        <svg id="icon-sound-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
        </svg>
        <svg id="icon-sound-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <line x1="23" y1="9" x2="17" y2="15"/>
            <line x1="17" y1="9" x2="23" y2="15"/>
        </svg>
    </button>

    <!-- APP -->
    <div id="stage">
        <div class="card">

            <!-- LANGUAGE SWITCHER TOP -->
            <div class="lang-switcher-top">
                <button class="lang-btn-top" data-lang="es">
                    <span class="lang-flag">🇪🇸</span>
                    <span class="lang-text">ES</span>
                </button>
                <button class="lang-btn-top" data-lang="en">
                    <span class="lang-flag">🇬🇧</span>
                    <span class="lang-text">EN</span>
                </button>
            </div>

            <!-- AVATAR -->
            <div class="avatar-wrap">
                <div class="avatar" id="avatar-el"></div>
                <div class="avatar-status"></div>
            </div>

            <!-- NAME -->
            <div class="name" id="name-el"></div>

            <!-- DYNAMIC CONTENT -->
            <div id="app-content"></div>

            <!-- NAVIGATION BUTTONS -->
            <div class="nav-buttons">
                <button class="nav-btn" data-nav="home">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                        <path d="M3 9.5L12 3L21 9.5V20H3V9.5Z"/>
                        <path d="M9 20V12H15V20"/>
                    </svg>
                    <span>Inicio</span>
                </button>
                <button class="nav-btn" data-nav="about">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                        <circle cx="12" cy="8" r="4"/>
                        <path d="M5 20v-2a7 7 0 0 1 14 0v2"/>
                    </svg>
                    <span>Sobre Mí</span>
                </button>
                <button class="nav-btn" data-nav="skills">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                        <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
                    </svg>
                    <span>Skills</span>
                </button>
                <button class="nav-btn" data-nav="projects">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                        <rect x="3" y="3" width="7" height="7" rx="1"/>
                        <rect x="14" y="3" width="7" height="7" rx="1"/>
                        <rect x="3" y="14" width="7" height="7" rx="1"/>
                        <rect x="14" y="14" width="7" height="7" rx="1"/>
                    </svg>
                    <span>Proyectos</span>
                </button>
            </div>

        </div>
    </div>

    <!-- Scripts -->
    <script src="config.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="js/modal.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/router.js"></script>
    <script src="js/main.js"></script>

</body>

</html>
