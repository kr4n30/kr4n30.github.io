<!-- Hero Section con efecto de typing -->
<div class="hero-section">
    <div class="greeting" id="greeting-el"></div>
    <div class="typing-container">
        <span class="typing-prefix"></span>
        <span class="typing-text" id="typing-text"></span>
        <span class="typing-cursor"></span>
    </div>
</div>

<div class="divider"></div>

<!-- Estadísticas rápidas -->
<div class="quick-stats">
    <div class="stat-item">
        <div class="stat-value" id="stat-projects">35+</div>
        <div class="stat-label">Proyectos</div>
    </div>
    <div class="stat-item">
        <div class="stat-value" id="stat-experience">4+</div>
        <div class="stat-label">Años</div>
    </div>
    <div class="stat-item">
        <div class="stat-value" id="stat-clients">25+</div>
        <div class="stat-label">Clientes</div>
    </div>
</div>

<!-- CTA Button -->
<div class="cta-section">
    <button class="cta-btn" id="explore-btn" data-nav="skills">
        <span>Explorar mi trabajo</span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="5" y1="12" x2="19" y2="12"/>
            <polyline points="12 5 19 12 12 19"/>
        </svg>
    </button>
</div>

<div class="divider"></div>

<!-- Social Icons -->
<div class="socials" id="socials-el"></div>

<div class="links" id="links-el"></div>
