<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile SPA</title>

    <link rel="stylesheet" href="css/style.css" />
</head>

<body>

    <!-- OVERLAY -->
    <div id="enter-overlay">
        <div id="enter-box">
            <div id="enter-pulse"></div>
            <svg viewBox="0 0 24 24" fill="currentColor" width="42" height="42">
                <polygon points="5 3 19 12 5 21 5 3"/>
            </svg>
            <span>tap to enter</span>
        </div>
    </div>

    <!-- VIDEO -->
    <div id="yt-bg">
        <div id="yt-player"></div>
    </div>

    <!-- SOUND -->
    <button id="sound-btn">
        <svg id="icon-sound-on" viewBox="0 0 24 24">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
        </svg>
        <svg id="icon-sound-off" viewBox="0 0 24 24" style="display:none">
            <line x1="23" y1="9" x2="17" y2="15"/>
        </svg>
    </button>

    <!-- APP -->
    <div id="stage">
        <div class="card">

            <!-- LANG -->
            <div class="lang-switcher-top">
                <button data-lang="es">🇪🇸</button>
                <button data-lang="en">🇬🇧</button>
            </div>

            <!-- AVATAR -->
            <div class="avatar-wrap">
                <div class="avatar" id="avatar-el"></div>
            </div>

            <!-- NAME -->
            <div class="name" id="name-el"></div>

            <!-- 🔥 SOLO CONTENEDOR -->
            <div id="app-content"></div>

            <!-- NAV -->
            <div class="nav-buttons">
                <button data-nav="home">Inicio</button>
                <button data-nav="about">Sobre mí</button>
                <button data-nav="skills">Skills</button>
                <button data-nav="projects">Proyectos</button>
            </div>

        </div>
    </div>

    <!-- Scripts -->
    <script src="config.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="js/i18n.js"></script>
    <script src="js/router.js"></script>
    <script src="js/main.js"></script>

</body>

</html>
