<div class="card">
    <div class="avatar-wrap">
        <div class="avatar" id="avatar-el"></div>
    </div>

    <div class="name" id="name-el"></div>

    <!-- Language Switcher -->
    <div class="lang-switcher">
        <button class="lang-btn" data-lang="es">🇪🇸 <span data-i18n="lang-es">ESPAÑOL</span></button>
        <button class="lang-btn" data-lang="en">🇬🇧 <span data-i18n="lang-en">ENGLISH</span></button>
    </div>

    <!-- Tagline (se llenará dinámicamente con JS) -->
    <div class="tagline" id="tagline-el"></div>

    <div class="divider"></div>

    <!-- Social Icons -->
    <div class="socials" id="socials-el"></div>

    <!-- Extra Links -->
    <div class="links" id="links-el"></div>

    <!-- Navigation Buttons -->
    <div class="nav-buttons">
        <button class="nav-btn" data-nav="home" data-active="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <path d="M3 9.5L12 3L21 9.5V20H3V9.5Z"/>
                <path d="M9 20V12H15V20"/>
            </svg>
            <span>Inicio</span>
        </button>
        <button class="nav-btn" data-nav="about">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <circle cx="12" cy="8" r="4"/>
                <path d="M5 20v-2a7 7 0 0 1 14 0v2"/>
            </svg>
            <span>Sobre Mí</span>
        </button>
        <button class="nav-btn" data-nav="projects">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <rect x="3" y="3" width="7" height="7" rx="1"/>
                <rect x="14" y="3" width="7" height="7" rx="1"/>
                <rect x="3" y="14" width="7" height="7" rx="1"/>
                <rect x="14" y="14" width="7" height="7" rx="1"/>
            </svg>
            <span>Proyectos</span>
        </button>
    </div>
</div>
